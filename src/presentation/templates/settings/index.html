{% extends "base.html" %}
{% block title %}Реквизиты организации{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-6">
  <h5 class="mb-3">Реквизиты организации</h5>
  {% if saved %}
  <div class="alert alert-success py-2">Реквизиты сохранены.</div>
  {% endif %}
  <div class="card p-4">
    <form method="post" action="/settings">
      <div class="mb-3">
        <label class="form-label">Наименование ОВО</label>
        <textarea class="form-control" name="org_name" rows="3">{{ settings.org_name if settings else '' }}</textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Должность начальника</label>
        <input class="form-control" name="chief_title" value="{{ settings.chief_title if settings else 'Начальник' }}">
      </div>
      <div class="mb-3">
        <label class="form-label">ФИО начальника</label>
        <input class="form-control" name="chief_name" value="{{ settings.chief_name if settings else '' }}">
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary">Сохранить</button>
        <a href="/" class="btn btn-outline-secondary">Отмена</a>
      </div>
    </form>
  </div>
</div>
</div>
{% endblock %}
