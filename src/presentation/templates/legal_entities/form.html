{% extends "base.html" %}
{% block title %}{% if entity %}Редактировать{% else %}Новое юр. лицо{% endif %}{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-6">
  <h5 class="mb-3">{% if entity %}Редактировать{% else %}Новое юридическое лицо{% endif %}</h5>
  <div class="card p-4">
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Название <span class="text-danger">*</span></label>
        <input class="form-control" name="name" required value="{{ entity.name if entity else '' }}">
      </div>
      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label">Тип</label>
          <select class="form-select" name="contract_type">
            {% for ct in contract_types %}
            <option value="{{ ct.value }}" {% if entity and entity.contract_type == ct %}selected{% endif %}>{{ ct.value }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-3">
          <label class="form-label">Номер</label>
          <input class="form-control" name="contract_number" type="number" value="{{ entity.contract_number if entity else 0 }}">
        </div>
        <div class="col-3">
          <label class="form-label">Код</label>
          <input class="form-control" name="code" type="number" value="{{ entity.code if entity and entity.code else '' }}">
        </div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary">Сохранить</button>
        <a href="/" class="btn btn-outline-secondary">Отмена</a>
      </div>
    </form>
  </div>
</div>
</div>
{% endblock %}
