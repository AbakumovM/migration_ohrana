<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — Охрана</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f6fa; }
    .login-card { max-width: 380px; margin: 100px auto; }
    .login-header { background: #1a3c5e; color: #fff; border-radius: 8px 8px 0 0; padding: 24px; text-align: center; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <i class="bi bi-shield-lock-fill fs-2"></i>
    <div class="fw-bold fs-5 mt-2">ОВО — Охраняемые объекты</div>
  </div>
  <div class="card border-0 shadow" style="border-radius: 0 0 8px 8px;">
    <div class="card-body p-4">
      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label">Логин</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label">Пароль</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>Войти
        </button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
