<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Охрана{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f6fa; }
    .navbar { background: #1a3c5e !important; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .table th { background: #eaf0f7; }
    .badge-kts { background: #0d6efd; }
    .badge-pul { background: #198754; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="/"><i class="bi bi-shield-lock-fill me-2"></i>ОВО — Охраняемые объекты</a>
    <div class="d-flex gap-3">
      <a class="nav-link text-white-50" href="/archive"><i class="bi bi-archive me-1"></i>Архив</a>
      <a class="nav-link text-white-50" href="/settings"><i class="bi bi-gear me-1"></i>Настройки</a>
      <a class="nav-link text-white-50" href="/logout"><i class="bi bi-box-arrow-right me-1"></i>Выйти</a>
    </div>
  </div>
</nav>
<div class="container-fluid px-4">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
