{% extends "base.html" %}
{% block title %}{% if obj %}Редактировать объект{% else %}Новый объект{% endif %}{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">
  <h5 class="mb-3">{% if obj %}Редактировать объект{% else %}Новый объект охраны{% endif %}</h5>
  <div class="card p-4">
    <form method="post" action="/objects/{% if obj %}{{ obj.id }}/edit{% else %}new{% endif %}">
      <input type="hidden" name="legal_entity_id" value="{{ obj.legal_entity_id if obj else legal_entity_id }}">
      <div class="mb-3">
        <label class="form-label">Наименование объекта <span class="text-danger">*</span></label>
        <input class="form-control" name="name" required value="{{ obj.name if obj else '' }}">
      </div>
      <div class="row g-3 mb-3">
        <div class="col-4">
          <label class="form-label">Город</label>
          <input class="form-control" name="town" value="{{ obj.town if obj else '' }}">
        </div>
        <div class="col-8">
          <label class="form-label">Адрес</label>
          <input class="form-control" name="street" value="{{ obj.street if obj else '' }}">
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label">Телефон</label>
          <input class="form-control" name="phone" value="{{ obj.phone if obj else '' }}">
        </div>
        <div class="col-6">
          <label class="form-label">Подписант</label>
          <input class="form-control" name="signatory" value="{{ obj.signatory if obj else '' }}">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Принят под охрану</label>
        <input class="form-control" name="accepted_date" type="date"
               value="{{ obj.accepted_date.isoformat() if obj and obj.accepted_date else '' }}">
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary">Сохранить</button>
        <a href="{% if obj %}/objects/{{ obj.id }}{% else %}/legal-entities/{{ legal_entity_id }}{% endif %}"
           class="btn btn-outline-secondary">Отмена</a>
      </div>
    </form>
  </div>
</div>
</div>
{% endblock %}
