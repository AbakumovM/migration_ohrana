name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSYS2 with GTK (нужен для WeasyPrint)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-pango
            mingw-w64-x86_64-cairo
            mingw-w64-x86_64-gdk-pixbuf2
            mingw-w64-x86_64-fontconfig
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-harfbuzz

      - name: Add MSYS2 to PATH
        run: Add-Content $env:GITHUB_PATH "C:\msys64\mingw64\bin"
        shell: pwsh

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv add --dev pyinstaller

      - name: Build EXE
        run: uv run pyinstaller ohrana.spec

      - name: Archive build
        run: Compress-Archive -Path dist\ohrana\* -DestinationPath ohrana-windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ohrana-windows
          path: ohrana-windows.zip
          retention-days: 90
